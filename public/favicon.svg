<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  role="img"
  aria-labelledby="title"
>
  <title id="title">
    Logo Olivier Polynice
  </title>

  <defs>
    <linearGradient
      id="background"
      x1="0"
      y1="0"
      x2="1"
      y2="1"
    >
      <stop
        offset="0%"
        stop-color="#173451"
      />

      <stop
        offset="100%"
        stop-color="#07111f"
      />
    </linearGradient>
  </defs>

  <rect
    width="60"
    height="60"
    x="2"
    y="2"
    rx="15"
    fill="url(#background)"
    stroke="#38bdf8"
    stroke-width="2"
  />

  <text
    x="32"
    y="39"
    fill="#38bdf8"
    font-family="Arial, Helvetica, sans-serif"
    font-size="24"
    font-weight="800"
    text-anchor="middle"
  >
    OP
  </text>
</svg>